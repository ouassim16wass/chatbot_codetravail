<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Assistant Code du travail</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Assistant Code du travail</h1>
  <p id="sous-titre">Questions-reponses sur le droit du travail francais, avec citation des articles</p>
</header>

<main>
  <section id="app">
    <div id="etat" class="carte etat">Chargement de la base documentaire...</div>
    <div id="conversation"></div>
    <div class="ligne saisie">
      <input id="champ-question" type="text" placeholder="Votre question sur le droit du travail..." maxlength="500" disabled>
      <button id="bouton-question" disabled>Envoyer</button>
    </div>
  </section>
</main>

<footer>
  <p>Corpus : Code du travail, base LEGI (DILA). Cet assistant ne fournit pas de conseil juridique.</p>
</footer>

<script type="module" src="app.js"></script>
</body>
</html>
